<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Lists</title>
</head>
<body>
    <h1>Lists</h1>

    <h3>Unodered List</h3>
    <ul type="square">
        <li>Raj</li>
        <li>Suyash</li>
        <li>Aditya</li>
        <li>Vedant</li>
    </ul>

    <h3>Ordered List</h3>
    <ol type="i" start="3">
        <li>Raj</li>
        <li>Suyash</li>
        <li>Aditya</li>
        <li>Vedant</li>
    </ol>

    <h3>Definition List</h3>
    <dl>
        <dt>Raj</dt>
        <dd>22B2214- Mechanical Engineering</dd>
        
        <dt>Suyash</dt>
        <dd>22B0426- Mechanical Engineering</dd>
        
        <dt>Aditya</dt>
        <dd>22B2215- Mechanical Engineering</dd>
        
        <dt>Vedant</dt>
        <dd>22B2221- Mechanical Engineering</dd>
    </dl>

</body>
</html>
