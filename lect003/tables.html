<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tables</title>
</head>
<body>
    <h1>Tables</h1>
    <table>
        <caption>Professional Details</caption>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Profession</th>
            <th>Previous Profession</th>
        </tr>
        <tr>
            <td>Raj Bhirud</td>
            <td>21</td>
            <td colspan="2">Student</td>
        </tr>
        <tr>
            <td>Sam</td>
            <td>75</td>
            <td rowspan="2">SDE2</td>
            <td>SDE1</td>
        </tr>
        <tr>
            <td>Torey</td>
            <td>25</td>
            <td>System enginer</td>
        </tr>
    </table>
</body>
</html>
