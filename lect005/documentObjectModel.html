<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Model</title>
    <style>
        .container {
            display: flex;
        }
        .box {
            width: 50px;
            height: 50px;
            border: 2px solid blue;
            margin: 5px;
            padding: 5px;
            background-color: chartreuse;
        }
        .square {
            width: 100px;
            height: 100px;
            border: 2px solid blueviolet;
            margin: 5px;
            padding: 5px;
            background-color: burlywood;
        }
    </style>
</head>
<body>
    <h1>Document Object Model</h1>

    <div class="container red yellow">
        <!-- comment node -->
        <div class="box">box1</div>
        <div class="box">box2</div>
        <div class="box">box3</div>
        <div id="red" class="box">box4</div>
        <div class="box query">box5</div>
        <div class="box query">box6</div>
        <div class="box query">box7</div>
    </div>

    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Raj</td>
            <td>21yrs</td>
        </tr>
    </table>

    <div class="quadrilateral">
        <div class="square">This is a square</div>
    </div>

    <script src="documentObjectModel.js"></script>
</body>
</html>
