<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flexbox</title>
    <style>
        .container {
            height: 40vh;
            border: 2px solid red;
            display: flex;
            justify-content: flex-start; /* main axis alignment and not always horizontal direction */
            /* align-items: center; */    /* cross axis alignment */
            align-content: center;
            /* there is no justify-items in flex-box */
            
            /* flex-direction: row-reverse; */
            /* flex-wrap: wrap; */
            flex-flow: row-reverse wrap;

            /* gap: 30px; */
            /* row-gap: 10px; */
            /* column-gap: 30px; */
            gap: 10px 30px;
        }
        .item {
            width: 50px;
            height: 50px;
            border: 2px solid blueviolet;
            margin: 4px;
            background-color: cyan;
            flex-grow: 1;
        }
        .item1 {
            flex-grow: 20;
        }

        .order-1 {
            order: 1;
        }
        .order-2 {
            order: 2;
        }
        .order-3 {
            order: 3;
        }
    </style>
</head>
<body>
    <h1>Flex-box</h1>

    <main>
        <div class="container">
            <div class="item item1">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
            <div class="item order-3">4</div>
            <div class="item">5</div>
            <div class="item order-1">6</div>
            <div class="item">7</div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
        </div>
    </main>
</body>
</html>
