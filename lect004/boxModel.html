<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        .biege {
            background-color: beige;
        }
        .box1 {
            color: navy;
            padding: 10px;
            border: 1px solid black;
            margin: 15px;
            height: 40px;
            box-sizing: border-box;
        }
        .box2 {
            color: red;
            padding: 10px;
            border: 1px solid violet;
            margin: 15px;
            height: 40px;
            box-sizing: content-box;
        }
    </style>
</head>
<body>
    <h1>CSS Box Model- Margin, Padding and Borders</h1>

    <div class="biege box1">This is a box</div>
    <div class="biege box2">This is another box</div>
</body>
</html>
