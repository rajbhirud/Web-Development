<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Lists Styling</title>
    <style>
        nav ul li {
            list-style: devanagari;
            background-color: pink;
            list-style-position: inside;
            /* list-style-image: url("https://5-pixels.fr/wp-content/uploads/2015/01/gif-5px.gif"); */
            /* list-style-type: "😍"; */
            list-style: inside "😍";
            border: 1px solid red;
        }
    </style>
</head>
<body>
    <h1>Styling Lists in CSS</h1>

    <nav>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
</body>
</html>
