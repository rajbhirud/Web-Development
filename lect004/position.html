<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        .box {
            width: 600px;
            height: 100vh;
            border: 2px solid blueviolet;
            margin: 4px;
            padding: 2px;
        }
        .box1 {
            background-color: aquamarine;
            position: absolute;
            z-index: 1;
            top: 0px;
            left: 10px;
        }
        .box2 {
            background-color: yellowgreen;
            position: relative; 
            left: 100px;
            top: 150px;
        }
        .box3 {
            background-color: bisque;
            position: fixed;
            top: 40vh;
            left: 10vw;
        }
        .box4 {
            background-color: lightcoral;
            position: sticky;
            height: 20vh;
            bottom: 0px;
        }
        .parent {
            margin: 10px;
            padding: 2px;
            border: 2px solid burlywood;
            /* position: absolute; */
            /* transform, filter or pespective properties can also make an element appear positioned */
            filter: invert(0);
        }
    </style>
</head>
<body>
    <h1>Position Property in CSS</h1>

    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>
</html>
